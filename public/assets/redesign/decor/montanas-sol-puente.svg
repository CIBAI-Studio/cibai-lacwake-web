<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" fill="none"
     color="#0D9488" role="img" aria-hidden="true"
     preserveAspectRatio="xMidYMid meet">
  <!-- Line-art sutil: montañas + sol + puente de la Baells.
       Lavado acuarela claro tipo papel + trazo fino recoloreable (currentColor, fallback teal).
       Uso: fondo decorativo esquina superior-derecha de "11 formas de vivir el agua". -->
  <title>Montañas, sol y puente de la Baells — line-art</title>

  <!-- lavado acuarela claro de fondo (papel) -->
  <defs>
    <radialGradient id="paper" cx="62%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#F6EFE2" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#EAF3F1" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="720" height="460" fill="url(#paper)"/>

  <g stroke="currentColor" stroke-width="1.4"
     stroke-linecap="round" stroke-linejoin="round" opacity="0.7">

    <!-- sol -->
    <circle cx="512" cy="96" r="42" stroke-width="1.6"/>
    <g opacity="0.75" stroke-width="1.3">
      <path d="M512 30v-20"/><path d="M512 182v20"/>
      <path d="M598 96h20"/><path d="M406 96h20"/>
      <path d="M573 35l14-14"/><path d="M451 157l-14 14"/>
      <path d="M573 157l14 14"/><path d="M451 35l-14-14"/>
    </g>

    <!-- cordillera lejana (plano trasero, más tenue) -->
    <path opacity="0.5" d="M20 250
      L96 176 L150 214 L214 150 L286 210 L352 138
      L430 206 L500 156 L576 214 L652 170 L710 226"/>

    <!-- cordillera media -->
    <path d="M0 300
      L70 232 L120 268 L188 198 L250 262 L320 206
      L392 276 L470 214 L540 272 L620 224 L700 284 L720 274"/>

    <!-- estribación cercana con pinos sugeridos -->
    <path opacity="0.85" d="M0 356
      L60 320 L108 348 L168 300 L232 350 L300 312
      L372 356 L440 322 L520 360 L600 328 L680 362 L720 348"/>

    <!-- puente / viaducto de arcos sobre el agua -->
    <g stroke-width="1.5">
      <!-- tablero -->
      <path d="M150 388 L560 388"/>
      <path d="M150 396 L560 396" opacity="0.6"/>
      <!-- pilares -->
      <path d="M180 396v40"/><path d="M248 396v46"/>
      <path d="M316 396v50"/><path d="M384 396v50"/>
      <path d="M452 396v46"/><path d="M520 396v40"/>
      <!-- arcos -->
      <path d="M180 436q34 -34 68 6" opacity="0.85"/>
      <path d="M248 442q34 -38 68 4" opacity="0.85"/>
      <path d="M316 446q34 -40 68 4" opacity="0.85"/>
      <path d="M384 446q34 -38 68 -4" opacity="0.85"/>
      <path d="M452 442q34 -34 68 -6" opacity="0.85"/>
    </g>

    <!-- reflejo de agua bajo el puente -->
    <g opacity="0.4" stroke-width="1.1">
      <path d="M210 452 q26 8 52 0 q26 -8 52 0"/>
      <path d="M330 458 q26 8 52 0 q26 -8 52 0"/>
    </g>
  </g>
</svg>
